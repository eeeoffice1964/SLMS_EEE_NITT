    // ==================== EMAIL FUNCTIONS ====================
    async function sendApprovalEmail(applicationData, studentData, action, oldData = null) {
      if (!studentData.Email) {
        console.log('Student has no email - skipping notification');
        return;
      }
      
      if (!GOOGLE_APPS_SCRIPT_URL) {
        console.warn('Google Apps Script URL not configured - skipping email notification');
        return;
      }
      
      try {
        // Prepare email data
        const emailParams = {
          to_email: studentData.Email,
          to_name: studentData.Name,
          student_id: studentData.ID,
          application_id: applicationData.ID,
          leave_type: applicationData.LeaveType,
          from_date: formatDateDDMMYYYY(applicationData.FromDate),
          to_date: formatDateDDMMYYYY(applicationData.ToDate),
          days: applicationData.NoOfDays,
          reason: applicationData.Reason,
          status: applicationData.Status,
          action: action,
          approved_by: currentUser?.email || (currentRole === 'staff' ? currentUser?.email : 'Admin'),
          approved_date: formatDateDDMMYYYY(new Date().toISOString()),
          category_year: `${studentData.Category || ''} - ${studentData.Year || ''}`.trim()
        };
        
        if (oldData) {
          emailParams.old_from_date = formatDateDDMMYYYY(oldData.FromDate);
          emailParams.old_to_date = formatDateDDMMYYYY(oldData.ToDate);
          emailParams.old_days = oldData.NoOfDays;
          emailParams.old_reason = oldData.Reason;
        }
        
        // Send to Google Apps Script
        const response = await fetch(GOOGLE_APPS_SCRIPT_URL, {
          method: 'POST',
          mode: 'no-cors',
          headers: {
            'Content-Type': 'application/json',
          },
          body: JSON.stringify(emailParams)
        });
        
        // Log email in Firestore
        try {
          const db = firebase.firestore();
          await db.collection('emailLogs').add({
            ...emailParams,
            sentAt: new Date().toISOString(),
            sentBy: currentUser?.email || 'system'
          });
        } catch (logError) {
          console.log('Could not log email to Firestore', logError);
        }
        
        console.log('Email sent successfully to:', studentData.Email);
        return true;
        
      } catch (error) {
        console.error('Error sending email via Google Apps Script:', error);
        return false;
      }
    }

    async function loadStudentLeaveBalance() {
      if (firebase.apps.length === 0) {
        document.getElementById('leaveBalanceContainer').innerHTML = `
          <div class="alert alert-warning">
            <i class="fas fa-exclamation-triangle"></i>
            Firebase not configured. Cannot load leave balance.
          </div>
        `;
        return;
      }
      
      try {
        const db = firebase.firestore();
        const student = currentStudent || currentUser;
        
        // Get year credits for student's category and year
        const yearCreditsSnapshot = await db.collection('yearCredits')
          .where('Category', '==', student.Category)
          .where('Year', '==', student.Year)
          .where('Active', '==', true)
          .get();
        
        if (yearCreditsSnapshot.empty) {
          document.getElementById('leaveBalanceContainer').innerHTML = `
            <div class="alert alert-warning">
              <i class="fas fa-exclamation-triangle"></i>
              <strong>No Leave Credits Found</strong>
              <p>No credit records found for ${student.Category} - ${student.Year}. Please contact administrator.</p>
            </div>
          `;
          return;
        }
        
        const yearCredit = yearCreditsSnapshot.docs[0].data();
        
        // Get all approved leave applications for this student only
        const applicationsSnapshot = await db.collection('leaveApplications')
          .where('StudentID', '==', student.ID)
          .where('Status', '==', 'approved')
          .get();
        
        const approvedLeaves = applicationsSnapshot.docs.map(doc => doc.data());
        
        // Calculate used credits by leave type
        const usedCredits = {};
        approvedLeaves.forEach(app => {
          if (!usedCredits[app.LeaveType]) {
            usedCredits[app.LeaveType] = 0;
          }
          usedCredits[app.LeaveType] += app.NoOfDays || 0;
        });
        
        // Get all credit leave types
        const leaveTypesSnapshot = await db.collection('leaveTypes')
          .where('ApprovalType', '==', 'credit')
          .where('Enabled', '==', true)
          .get();
        
        const creditLeaveTypes = leaveTypesSnapshot.docs.map(doc => doc.data());
        
        if (creditLeaveTypes.length === 0) {
          document.getElementById('leaveBalanceContainer').innerHTML = `
            <div style="text-align: center; padding: 40px; color: #666;">
              <i class="fas fa-calendar-times" style="font-size: 3rem; margin-bottom: 15px;"></i>
              <h3>No Credit Leave Types</h3>
              <p>No credit-based leave types have been configured.</p>
            </div>
          `;
          return;
        }
        
        // Build balance display
        let balanceHTML = '';
        let hasAnyCredits = false;
        
        creditLeaveTypes.forEach(lt => {
          const totalCredits = yearCredit[lt.Code] || 0;
          const used = usedCredits[lt.Code] || 0;
          const remaining = Math.max(0, totalCredits - used);
          
          if (totalCredits > 0) hasAnyCredits = true;
          
          balanceHTML += `
            <div class="leave-balance-card" style="border-top-color: ${totalCredits > 0 ? '#27ae60' : '#95a5a6'}">
              <div class="leave-name">${lt.Name} (${lt.Code})</div>
              <div class="leave-count ${remaining === 0 ? 'text-danger' : ''}">${remaining}</div>
              <div>Days Available</div>
              <div style="font-size: 0.85rem; color: #666; margin-top: 5px;">
                Total: ${totalCredits} | Used: ${used}
              </div>
              ${lt.MaxDaysPerYear ? `
                <div style="font-size: 0.75rem; color: #999; margin-top: 3px;">
                  Max/Year: ${lt.MaxDaysPerYear}
                </div>
              ` : ''}
            </div>
          `;
        });
        
        if (!hasAnyCredits) {
          balanceHTML = `
            <div class="alert alert-warning" style="grid-column: 1/-1;">
              <i class="fas fa-exclamation-triangle"></i>
              No credit values have been set for ${student.Category} - ${student.Year}. Please contact administrator.
            </div>
          ` + balanceHTML;
        }
        
        document.getElementById('leaveBalanceContainer').innerHTML = balanceHTML;
        
      } catch (error) {
        console.error('Load leave balance error:', error);
        document.getElementById('leaveBalanceContainer').innerHTML = `
          <div class="alert alert-danger">
            <i class="fas fa-exclamation-circle"></i>
            Failed to load leave balance: ${error.message}
          </div>
        `;
      }
    }

    function formatDateForDisplay(dateString) {
      if (!dateString) return 'N/A';
      try {
        const date = new Date(dateString);
        if (isNaN(date.getTime())) return 'N/A';
        
        const day = date.getDate().toString().padStart(2, '0');
        const month = (date.getMonth() + 1).toString().padStart(2, '0');
        const year = date.getFullYear();
        return `${day}/${month}/${year}`;
      } catch (e) {
        return 'N/A';
      }
    }

              .where('Category', 'in', scopeFilter)

    async function approveLeave(applicationId) {
      showConfirmationDialog(
        "Approve Leave",
        "Are you sure you want to approve this leave application?",
        async () => {
          try {
            const db = firebase.firestore();
            
            const appDoc = await db.collection('leaveApplications').doc(applicationId).get();
            if (!appDoc.exists) {
              showAlert('Application not found', 'danger');
              return;
            }
            
            const application = appDoc.data();
            
            await db.collection('leaveApplications').doc(applicationId).update({
              Status: 'approved',
              ApprovedDate: new Date().toISOString(),
              ApprovedBy: currentUser?.email || (currentRole === 'staff' ? currentUser?.email : 'admin'),
              ApprovedByRole: currentRole || 'admin',
              updatedAt: new Date().toISOString()
            });
            
            // Log staff action if applicable
            if (currentRole === 'staff') {
              await logStaffAction(currentUser.uid, 'approve_leave', { 
                applicationId: applicationId,
                studentId: application.StudentID 
              });
            }
            
            // Send email notification if configured
            if (application.StudentID && GOOGLE_APPS_SCRIPT_URL) {
              const studentSnapshot = await db.collection('students').where('ID', '==', application.StudentID).get();
              if (!studentSnapshot.empty) {
                const student = studentSnapshot.docs[0].data();
                await sendApprovalEmail({...application, Status: 'approved'}, student, 'approved');
              }
            }
            
            showAlert('Leave application approved successfully!', 'success');
            
            if (currentRole === 'staff') {
              showStaffSection('leaveApprovals');
            } else {
              showLeaveApprovals();
            }
            
          } catch (error) {
            console.error('Approve leave error:', error);
            showAlert('Failed to approve leave: ' + error.message, 'danger');
          }
        }
      );
    }

    async function editLeaveApplication(applicationId) {
      try {
        const db = firebase.firestore();
        
        const appDoc = await db.collection('leaveApplications').doc(applicationId).get();
        if (!appDoc.exists) {
          showAlert('Application not found', 'danger');
          return;
        }
        
        const app = { id: appDoc.id, ...appDoc.data() };
        
        // Check if staff has permission to edit
        if (currentRole === 'staff' && !hasPermission('leaveHistory', 'write')) {
          showAlert('You do not have permission to edit leave applications', 'danger');
          return;
        }
        
        // Load student details for this application
        let studentName = 'Unknown';
        let studentEmail = 'No email';
        let studentCategory = '';
        let studentYear = '';
        let studentSemester = '';
        let studentSpecialization = '';
        
        if (app.StudentID) {
          const studentsSnapshot = await db.collection('students').where('ID', '==', app.StudentID).get();
          if (!studentsSnapshot.empty) {
            const student = studentsSnapshot.docs[0].data();
            studentName = student.Name || 'Unknown';
            studentEmail = student.Email || 'No email';
            studentCategory = student.Category || '';
            studentYear = student.Year || '';
            studentSemester = student.Semester || '';
            studentSpecialization = student.Specialization || '';
          }
        }
        
        const modal = document.getElementById('operationModal');
        
        const fromDate = app.FromDate ? app.FromDate.split('T')[0] : '';
        const toDate = app.ToDate ? app.ToDate.split('T')[0] : '';
        
        modal.innerHTML = `
          <div class="modal-content">
            <div class="close-modal" onclick="closeModal()">&times;</div>
            <h2><i class="fas fa-edit"></i> Edit Leave Application #${app.ID}</h2>
            
            <div class="alert alert-info">
              <i class="fas fa-info-circle"></i>
              <strong>Editing application for:</strong><br>
              ${studentName} (${app.StudentID})<br>
              <small>${studentCategory} ${studentYear} ${studentSemester} ${studentSpecialization}</small><br>
              <small>Email: ${studentEmail}</small>
            </div>
            
            <form onsubmit="updateLeaveApplicationForm(event, '${applicationId}')">
              <div class="form-row">
                <div class="form-group">
                  <label>From Date <span style="color: red;">*</span></label>
                  <input type="date" class="form-control" id="editLeaveFromDate" value="${fromDate}" required onchange="validateEditDates()">
                </div>
                <div class="form-group">
                  <label>To Date <span style="color: red;">*</span></label>
                  <input type="date" class="form-control" id="editLeaveToDate" value="${toDate}" required onchange="validateEditDates()">
                </div>
              </div>
              
              <div id="editDateValidationMessage" style="margin-bottom: 15px;"></div>
              
              <div class="form-row">
                <div class="form-group">
                  <label>Number of Days <span style="color: red;">*</span></label>
                  <input type="number" class="form-control" id="editLeaveNoOfDays" value="${app.NoOfDays || 0}" min="1" required onchange="validateEditDays()">
                  <small style="color: #666;">Enter manually or auto-calculate from dates</small>
                </div>
                <div class="form-group">
                  <label>Leave Type</label>
                  <input type="text" class="form-control" value="${app.LeaveType || ''}" readonly>
                </div>
              </div>
              
              <div class="form-group">
                <label>Reason for Leave <span style="color: red;">*</span></label>
                <textarea class="form-control" id="editLeaveReason" rows="4" required>${app.Reason || ''}</textarea>
              </div>
              
              <div class="form-group">
                <label>Status <span style="color: red;">*</span></label>
                <select class="form-control" id="editLeaveStatus" required>
                  <option value="pending" ${app.Status === 'pending' ? 'selected' : ''}>Pending</option>
                  <option value="approved" ${app.Status === 'approved' ? 'selected' : ''}>Approved</option>
                  <option value="rejected" ${app.Status === 'rejected' ? 'selected' : ''}>Rejected</option>
                </select>
              </div>
              
              <div style="display: flex; gap: 10px; margin-top: 20px;">
                <button type="submit" class="btn btn-success" style="flex: 1;">
                  <i class="fas fa-save"></i> Update Application
                </button>
                <button type="button" class="btn btn-secondary" style="flex: 1;" onclick="closeModal()">
                  Cancel
                </button>
              </div>
            </form>
          </div>
        `;
        modal.style.display = 'flex';
        
        // Add event listeners for date validation
        document.getElementById('editLeaveFromDate').addEventListener('change', calculateEditDays);
        document.getElementById('editLeaveToDate').addEventListener('change', calculateEditDays);
        
        window.validateEditDates = function() {
          const fromDate = document.getElementById('editLeaveFromDate').value;
          const toDate = document.getElementById('editLeaveToDate').value;
          const validationDiv = document.getElementById('editDateValidationMessage');
          
          if (!fromDate || !toDate) {
            validationDiv.innerHTML = '';
            return;
          }
          
          const from = new Date(fromDate);
          const to = new Date(toDate);
          from.setHours(0, 0, 0, 0);
          to.setHours(0, 0, 0, 0);
          
          if (from > to) {
            validationDiv.innerHTML = `
              <div class="date-validation-error">
                <i class="fas fa-exclamation-circle"></i>
                <strong>Error:</strong> From Date cannot be after To Date
              </div>
            `;
            document.getElementById('editLeaveToDate').value = fromDate;
            calculateEditDays();
          } else {
            validationDiv.innerHTML = `
              <div class="date-validation-success">
                <i class="fas fa-check-circle"></i>
                Dates are valid
              </div>
            `;
            calculateEditDays();
          }
        };
        
        function calculateEditDays() {
          const fromDate = document.getElementById('editLeaveFromDate').value;
          const toDate = document.getElementById('editLeaveToDate').value;
          const daysField = document.getElementById('editLeaveNoOfDays');
          
          if (fromDate && toDate) {
            const from = new Date(fromDate);
            const to = new Date(toDate);
            
            if (from <= to) {
              const timeDiff = to.getTime() - from.getTime();
              const dayDiff = Math.ceil(timeDiff / (1000 * 3600 * 24)) + 1;
              daysField.value = dayDiff;
            }
          }
        }
        
        window.validateEditDays = function() {
          const days = parseInt(document.getElementById('editLeaveNoOfDays').value) || 0;
          if (days <= 0) {
            showAlert('Number of days must be greater than 0', 'warning');
            document.getElementById('editLeaveNoOfDays').value = 1;
          }
        };
        
      } catch (error) {
        console.error('Edit application error:', error);
        showAlert('Failed to load application: ' + error.message, 'danger');
      }
    }

      const fromDate = document.getElementById('editLeaveFromDate').value;
      const toDate = document.getElementById('editLeaveToDate').value;
      const noOfDays = parseInt(document.getElementById('editLeaveNoOfDays').value) || 0;
      const reason = document.getElementById('editLeaveReason').value;
      const status = document.getElementById('editLeaveStatus').value;
      
      if (!fromDate || !toDate) {
        showAlert('Please fill in both date fields', 'warning');
        return;
      }
      
      const from = new Date(fromDate);
      const to = new Date(toDate);
      from.setHours(0, 0, 0, 0);
      to.setHours(0, 0, 0, 0);
      
      if (to < from) {
        showAlert('To Date cannot be earlier than From Date', 'warning');
        return;
      }
      
      if (noOfDays <= 0) {
        showAlert('Number of days must be greater than 0', 'warning');
        return;
      }
      
      try {
        const db = firebase.firestore();
        
        const oldAppDoc = await db.collection('leaveApplications').doc(applicationId).get();
        if (!oldAppDoc.exists) {
          showAlert('Application not found', 'danger');
          return;
        }
        
        const oldAppData = oldAppDoc.data();
        
        const applicationData = {
          FromDate: fromDate,
          ToDate: toDate,
          NoOfDays: noOfDays,
          Reason: reason,
          Status: status,
          UpdatedAt: new Date().toISOString(),
          UpdatedBy: currentUser?.email || (currentRole === 'staff' ? currentUser?.email : 'admin'),
          UpdatedByRole: currentRole || 'admin'
        };
        
        await db.collection('leaveApplications').doc(applicationId).update(applicationData);
        
        // Log staff action if applicable
        if (currentRole === 'staff') {
          await logStaffAction(currentUser.uid, 'update_leave', { 
            applicationId: applicationId,
            studentId: oldAppData.StudentID 
          });
        }
        
        // Send email notification for ALL edits
        if (GOOGLE_APPS_SCRIPT_URL) {
          const updatedApp = { ...oldAppData, ...applicationData, Status: status };
          
          if (updatedApp.StudentID) {
            const studentSnapshot = await db.collection('students').where('ID', '==', updatedApp.StudentID).get();
            if (!studentSnapshot.empty) {
              const student = studentSnapshot.docs[0].data();
              
              // Check what changed to determine email type
              let action = 'updated';
              if (oldAppData.Status !== status) {
                action = status;
              }
              
              await sendApprovalEmail(updatedApp, student, action, oldAppData);
            }
          }
        }
        
        showAlert('Leave application updated successfully!', 'success');
        closeModal();
        
        if (currentRole === 'staff') {
          showStaffSection('leaveHistory');
        } else {
          showLeaveHistory();
        }
        
      } catch (error) {
        console.error('Update application error:', error);
        showAlert('Failed to update application: ' + error.message, 'danger');
      }
    }

    // ==================== MODIFIED: deleteLeaveApplication with counter reset ====================
    async function deleteLeaveApplication(applicationId) {
      showConfirmationDialog(
        "Delete Leave Application",
        "Are you sure you want to delete this leave application? This action cannot be undone.",
        async () => {
          try {
            const db = firebase.firestore();
            
            // Delete the application
            await db.collection('leaveApplications').doc(applicationId).delete();
            
            // Check if this was the last application and reset counter if needed
            const remainingAppsSnapshot = await db.collection('leaveApplications').limit(1).get();
            
            if (remainingAppsSnapshot.empty) {
              console.log('All leave applications deleted - resetting counter');
              
              // Delete all counter documents to reset sequence
              const countersSnapshot = await db.collection('counters').get();
              const batch = db.batch();
              countersSnapshot.docs.forEach(doc => {
                batch.delete(doc.ref);
              });
              await batch.commit();
              
              showAlert('Last application deleted. Counter reset to 0001 for next application.', 'info');
            }
            
            showAlert('Leave application deleted successfully!', 'success');
            
            if (currentRole === 'staff') {
              showStaffSection('leaveHistory');
            } else {
              showLeaveHistory();
            }
            
          } catch (error) {
            console.error('Delete application error:', error);
            showAlert('Failed to delete application: ' + error.message, 'danger');
          }
        }
      );
    }

      showConfirmationDialog(

    // Process bulk delete
    async function processBulkDelete() {
      if (selectedStudents.size === 0) {
        showAlert('No students selected', 'warning');
        return;
      }
      
      showAlert(`Deleting ${selectedStudents.size} students...`, 'info');
      
      try {
        const db = firebase.firestore();
        const batch = db.batch();
        let deletedCount = 0;
        const errors = [];
        
        // Convert Set to Array for iteration
        const studentIds = Array.from(selectedStudents);
        
        for (const studentId of studentIds) {
          try {
            // Find the student document
            const snapshot = await db.collection('students').where('ID', '==', studentId).get();
            
            if (!snapshot.empty) {
              batch.delete(snapshot.docs[0].ref);
              deletedCount++;
            } else {
              errors.push(`Student ID ${studentId} not found`);
            }
          } catch (err) {
            errors.push(`Error deleting ${studentId}: ${err.message}`);
          }
        }
        
        // Commit the batch
        if (deletedCount > 0) {
          await batch.commit();
        }
        
        // Clear selections
        selectedStudents.clear();
        
        if (errors.length > 0) {
          showAlert(`Deleted ${deletedCount} students. ${errors.length} errors.`, 'warning');
          console.error('Delete errors:', errors);
        } else {
          showAlert(`Successfully deleted ${deletedCount} students!`, 'success');
        }
        
        // Refresh the student list
        showStudentsManagement();
        
      } catch (error) {
        console.error('Bulk delete error:', error);
        showAlert('Failed to delete students: ' + error.message, 'danger');
      }
    }

    // Generate year options from Categories collection
    function generateYearOptions(categories, selectedCategories) {
      let options = '';
      
      // If only one category selected, show its years
      if (selectedCategories.length === 1) {
        const category = categories.find(c => c.Category === selectedCategories[0]);
        if (category && category.Years) {

    // Process bulk update
    async function processBulkUpdate(event) {
      event.preventDefault();
      
      const year = document.getElementById('bulkYear').value;
      const semester = document.getElementById('bulkSemester').value;
      const specialization = document.getElementById('bulkSpecialization').value;
      
      // Check if anything selected to update
      if (!year && !semester && !specialization) {
        showAlert('Please select at least one field to update', 'warning');
        return;
      }
      
      if (selectedStudents.size === 0) {
        showAlert('No students selected', 'warning');
        closeModal();
        return;
      }
      
      showAlert(`Updating ${selectedStudents.size} students...`, 'info');
      
      try {
        const db = firebase.firestore();
        const batch = db.batch();
        let updatedCount = 0;
        const errors = [];
        
        const studentIds = Array.from(selectedStudents);
        
        for (const studentId of studentIds) {
          try {
            const snapshot = await db.collection('students').where('ID', '==', studentId).get();
            
            if (!snapshot.empty) {
              const docRef = snapshot.docs[0].ref;
              const updateData = {};
              
              if (year) updateData.Year = year;
              if (semester) updateData.Semester = semester;
              if (specialization) updateData.Specialization = specialization;
              
              updateData.updatedAt = new Date().toISOString();
              updateData.updatedBy = currentUser?.email || 'admin';
              
              batch.update(docRef, updateData);
              updatedCount++;
            } else {
              errors.push(`Student ID ${studentId} not found`);
            }
          } catch (err) {
            errors.push(`Error updating ${studentId}: ${err.message}`);
          }
        }
        
        if (updatedCount > 0) {
          await batch.commit();
        }
        
        // Clear selections
        selectedStudents.clear();
        closeModal();
        
        if (errors.length > 0) {
          showAlert(`Updated ${updatedCount} students. ${errors.length} errors.`, 'warning');
        } else {
          showAlert(`Successfully updated ${updatedCount} students!`, 'success');
        }
        
        // Refresh the student list
        showStudentsManagement();
        
      } catch (error) {
        console.error('Bulk update error:', error);
        showAlert('Failed to update students: ' + error.message, 'danger');
      }
    }

    // Handle leave upload file
    function handleLeaveUpload(event) {
      const file = event.target.files[0];
      if (!file) return;
      
      if (file.size > 5 * 1024 * 1024) {
        showAlert('File size exceeds 5MB limit', 'danger');
        return;
      }
      
      const reader = new FileReader();
      reader.onload = function(e) {
        try {
          const text = e.target.result;
          const rows = [];
          const lines = text.split('\n');
          
          for (let i = 0; i < lines.length; i++) {
            if (lines[i].trim() === '') continue;
            
            const row = [];
            let current = '';
            let insideQuotes = false;
            
            for (let j = 0; j < lines[i].length; j++) {
              const char = lines[i][j];
              
              if (char === '"') {
                insideQuotes = !insideQuotes;
              } else if (char === ',' && !insideQuotes) {
                row.push(current.trim());
                current = '';
              } else {
                current += char;
              }
            }
            row.push(current.trim());
            rows.push(row);
          }
          
          if (rows.length < 2) {
            showAlert('CSV file must have at least a header row and one data row', 'warning');
            return;
          }
          
          // Validate headers
          const headers = rows[0].map(h => h.toLowerCase().trim());
          const requiredHeaders = ['student id', 'leave type', 'from date', 'to date', 'status'];
          const missingHeaders = requiredHeaders.filter(h => !headers.includes(h));
          
          if (missingHeaders.length > 0) {
            showAlert(`Missing required columns: ${missingHeaders.join(', ')}`, 'danger');
            return;
          }
          
          const previewDiv = document.getElementById('leaveUploadPreview');
          const previewTable = document.getElementById('leavePreviewTable');
          
          let previewHTML = '<table style="width: 100%; border-collapse: collapse; font-size: 14px;">';
          previewHTML += '<thead><tr style="background: #f8f9fa;">';
          rows[0].forEach((cell, index) => {
            previewHTML += `<th style="border: 1px solid #ddd; padding: 8px; text-align: left;">${cell}</th>`;
          });
          previewHTML += '</tr></thead><tbody>';
          
          const previewRows = Math.min(10, rows.length - 1);
          for (let i = 1; i <= previewRows; i++) {
            previewHTML += '<tr>';
            rows[i].forEach((cell, index) => {
              previewHTML += `<td style="border: 1px solid #ddd; padding: 8px;">${cell || '-'}</td>`;
            });
            previewHTML += '</tr>';
          }
          previewHTML += '</tbody></table>';
          
          if (rows.length > 11) {
            previewHTML += `<p style="text-align: center; color: #666; margin-top: 10px;">... and ${rows.length - 11} more rows</p>`;
          }
          
          previewTable.innerHTML = previewHTML;
          previewDiv.style.display = 'block';
          document.getElementById('leaveUploadArea').style.display = 'none';
          
          // Store data for processing (skip header row)
          uploadedLeaveData = rows.slice(1).filter(row => row.length >= 5 && row[0] && row[1] && row[2] && row[3] && row[4]);
          
          showAlert(`Loaded ${uploadedLeaveData.length} leave records for upload`, 'info');
          
        } catch (error) {
          console.error('CSV parsing error:', error);
          showAlert('Error parsing CSV file: ' + error.message, 'danger');
        }
      };
      
      reader.readAsText(file);
    }

    // Process leave upload
    async function processLeaveUpload() {
      if (uploadedLeaveData.length === 0) {
        showAlert('No data to upload!', 'warning');
        return;
      }
      
      showAlert(`Processing ${uploadedLeaveData.length} leave records...`, 'info');
      
      try {
        const db = firebase.firestore();
        let successCount = 0;
        let errorCount = 0;
        let skippedCount = 0;
        let overlapCount = 0;
        const errors = [];
        const warnings = [];
        const overlaps = [];
        
        // Get all existing students for validation
        const studentsSnapshot = await db.collection('students').get();
        const existingStudents = new Set();
        const studentDetails = {};
        studentsSnapshot.docs.forEach(doc => {
          const student = doc.data();
          existingStudents.add(student.ID);
          studentDetails[student.ID] = student;
        });
        
        // Get all leave types for validation
        const leaveTypesSnapshot = await db.collection('leaveTypes').get();
        const validLeaveTypes = new Set();
        const leaveTypeMap = {};
        leaveTypesSnapshot.docs.forEach(doc => {
          const lt = doc.data();
          validLeaveTypes.add(lt.Code);
          leaveTypeMap[lt.Code] = lt;
        });
        
        // Group records by student ID for efficient overlap checking
        const recordsByStudent = {};
        uploadedLeaveData.forEach((row, index) => {
          const studentId = row[0]?.trim();
          if (!studentId) return;
          
          if (!recordsByStudent[studentId]) {
            recordsByStudent[studentId] = [];
          }
          
          recordsByStudent[studentId].push({
            rowIndex: index,
            row: row,
            studentId: studentId
          });
        });
        
        // For each student, check overlaps with existing AND within uploaded records
        for (const studentId of Object.keys(recordsByStudent)) {
          // Skip if student doesn't exist (will be caught later)
          if (!existingStudents.has(studentId)) continue;
          
          // Get ALL existing approved and pending leave applications for this student
          const existingAppsSnapshot = await db.collection('leaveApplications')
            .where('StudentID', '==', studentId)
            .where('Status', 'in', ['pending', 'approved'])
            .get();
          
          const existingApps = existingAppsSnapshot.docs.map(doc => ({
            id: doc.id,
            ...doc.data()
          }));
          
          // Process each record for this student
          const studentRecords = recordsByStudent[studentId];
          
          // Sort records by date for better overlap detection
          studentRecords.sort((a, b) => {
            const dateA = new Date(a.row[2] || '');
            const dateB = new Date(b.row[3] || '');
            return dateA - dateB;
          });
          
          // Check overlaps within the uploaded batch for this student
          for (let i = 0; i < studentRecords.length; i++) {
            const record = studentRecords[i];
            const row = record.row;
            
            // Parse dates for this record
            const fromDate = row[2]?.trim();
            const toDate = row[3]?.trim();
            
            if (!fromDate || !toDate) {
              errors.push(`Row ${record.rowIndex + 2}: Missing dates for student ${studentId}`);
              errorCount++;
              continue;
            }
            
            const from = new Date(fromDate);
            const to = new Date(toDate);
            
            if (isNaN(from.getTime()) || isNaN(to.getTime())) {
              errors.push(`Row ${record.rowIndex + 2}: Invalid date format for student ${studentId}`);
              errorCount++;
              continue;
            }
            
            from.setHours(0, 0, 0, 0);
            to.setHours(23, 59, 59, 999);
            
            // Check against existing applications in database
            for (const existingApp of existingApps) {
              const existingFrom = new Date(existingApp.FromDate);
              const existingTo = new Date(existingApp.ToDate);
              
              existingFrom.setHours(0, 0, 0, 0);
              existingTo.setHours(23, 59, 59, 999);
              
              if (from <= existingTo && to >= existingFrom) {
                overlaps.push({
                  row: record.rowIndex + 2,
                  studentId: studentId,
                  existingId: existingApp.ID,
                  existingDates: `${formatDate(existingApp.FromDate)} to ${formatDate(existingApp.ToDate)}`,
                  newDates: `${formatDate(fromDate)} to ${formatDate(toDate)}`
                });
                overlapCount++;
                break; // Stop checking once overlap found
              }
            }
            
            // If no overlap with existing, check against other records in the same batch
            if (overlaps.filter(o => o.row === record.rowIndex + 2).length === 0) {
              for (let j = i + 1; j < studentRecords.length; j++) {
                const otherRecord = studentRecords[j];
                const otherRow = otherRecord.row;
                const otherFrom = new Date(otherRow[2]?.trim());
                const otherTo = new Date(otherRow[3]?.trim());
                
                if (isNaN(otherFrom.getTime()) || isNaN(otherTo.getTime())) continue;
                
                otherFrom.setHours(0, 0, 0, 0);
                otherTo.setHours(23, 59, 59, 999);
                
                if (from <= otherTo && to >= otherFrom) {
                  overlaps.push({
                    row: record.rowIndex + 2,
                    studentId: studentId,
                    conflictingRow: otherRecord.rowIndex + 2,
                    existingDates: `${formatDate(otherRow[2]?.trim())} to ${formatDate(otherRow[3]?.trim())}`,
                    newDates: `${formatDate(fromDate)} to ${formatDate(toDate)}`
                  });
                  overlapCount++;
                  break;
                }
              }
            }
          }
        }
        
        // If there are overlaps, show error and stop upload
        if (overlapCount > 0) {
          const resultDiv = document.getElementById('uploadResult');
          let overlapHTML = `
            <div class="alert alert-danger">
              <i class="fas fa-times-circle"></i>
              <div>
                <strong>Upload Failed: Date Overlaps Detected</strong>
                <p>Found ${overlapCount} overlapping leave applications. Please fix these overlaps and try again.</p>
              </div>
            </div>
            <div class="alert alert-warning" style="margin-top: 15px; max-height: 300px; overflow-y: auto;">
              <strong>Overlap Details:</strong>
              <ul style="margin: 10px 0 0 20px;">
                ${overlaps.slice(0, 20).map(overlap => `
                  <li>
                    Row ${overlap.row}: Student ${overlap.studentId} - 
                    ${overlap.existingId ? 
                      `Conflicts with existing application ${overlap.existingId} (${overlap.existingDates})` : 
                      `Conflicts with row ${overlap.conflictingRow} in the same upload (${overlap.existingDates})`
                    }
                  </li>
                `).join('')}
                ${overlaps.length > 20 ? `<li>... and ${overlaps.length - 20} more overlaps</li>` : ''}
              </ul>
            </div>
          `;
          
          resultDiv.innerHTML = overlapHTML;
          resultDiv.style.display = 'block';
          
          showAlert('Upload failed due to date overlaps', 'danger');
          return;
        }
        
        // No overlaps found, proceed with upload using batch
        const batch = db.batch();
        let batchCount = 0;
        const BATCH_LIMIT = 500;
        
        for (const row of uploadedLeaveData) {
          try {
            const studentId = row[0]?.trim();
            const leaveType = row[1]?.trim().toUpperCase();
            const fromDate = row[2]?.trim();
            const toDate = row[3]?.trim();
            const days = row[4] ? parseInt(row[4]) || 0 : 0;
            const reason = row[5]?.trim() || '';
            const status = row[6]?.trim().toLowerCase() || 'pending';
            
            // Validate required fields
            if (!studentId || !leaveType || !fromDate || !toDate) {
              errors.push(`Missing required fields for student ${studentId || 'unknown'}`);
              errorCount++;
              continue;
            }
            
            // Validate student exists
            if (!existingStudents.has(studentId)) {
              errors.push(`Student ID ${studentId} not found in system - skipped`);
              skippedCount++;
              continue;
            }
            
            // Validate leave type
            if (!validLeaveTypes.has(leaveType)) {
              errors.push(`Invalid leave type ${leaveType} for student ${studentId} - skipped`);
              skippedCount++;
              continue;
            }
            
            // Validate dates
            const from = new Date(fromDate);
            const to = new Date(toDate);
            
            if (isNaN(from.getTime()) || isNaN(to.getTime())) {
              errors.push(`Invalid date format for student ${studentId}`);
              errorCount++;
              continue;
            }
            
            if (from > to) {
              errors.push(`From date cannot be after to date for student ${studentId}`);
              errorCount++;
              continue;
            }
            
            // Calculate days if not provided
            let numberOfDays = days;
            if (numberOfDays <= 0) {
              const timeDiff = to.getTime() - from.getTime();
              numberOfDays = Math.ceil(timeDiff / (1000 * 3600 * 24)) + 1;
            }
            
            // Validate status
            if (!['pending', 'approved', 'rejected'].includes(status)) {
              warnings.push(`Invalid status "${status}" for student ${studentId}, using "pending"`);
            }
            
            // Generate application ID
            const appIdInfo = await generateApplicationId();
            
            // Create leave application data
            const applicationData = {
              ID: appIdInfo.id,
              Year: appIdInfo.year,
              SequenceNumber: appIdInfo.sequence,
              StudentID: studentId,
              LeaveType: leaveType,
              FromDate: fromDate,
              ToDate: toDate,
              NoOfDays: numberOfDays,
              Reason: reason,
              Status: status,
              AppliedDate: new Date().toISOString(),
              AppliedBy: currentUser?.email || 'admin',
              AppliedByRole: currentRole || 'admin',
              ImportedVia: 'bulk_upload',
              ImportedAt: new Date().toISOString(),
              Semester: studentDetails[studentId]?.Semester || ''
            };
            
            // Add to batch
            const docRef = db.collection('leaveApplications').doc();
            batch.set(docRef, applicationData);
            batchCount++;
            successCount++;
            
            // Commit batch if limit reached
            if (batchCount >= BATCH_LIMIT) {
              await batch.commit();
              batchCount = 0;
            }
            
          } catch (err) {
            errors.push(`Error processing row: ${err.message}`);
            errorCount++;
          }
        }
        
        // Commit remaining batch
        if (batchCount > 0) {
          await batch.commit();
        }
        
        // Show results
        const resultDiv = document.getElementById('uploadResult');
        let resultHTML = `
          <div class="alert ${successCount > 0 ? 'alert-success' : 'alert-warning'}">
            <i class="fas ${successCount > 0 ? 'fa-check-circle' : 'fa-exclamation-triangle'}"></i>
            <div>
              <strong>Upload Complete</strong>
              <p>✅ Successfully uploaded: ${successCount} leave applications</p>
              <p>⚠️ Skipped (student not found): ${skippedCount}</p>
              <p>❌ Errors: ${errorCount}</p>
              <p>📊 Total processed: ${uploadedLeaveData.length}</p>
            </div>
          </div>
        `;
        
        if (warnings.length > 0) {
          resultHTML += `
            <div class="alert alert-warning" style="margin-top: 15px;">
              <i class="fas fa-exclamation-triangle"></i>
              <div>
                <strong>Warnings:</strong>
                <ul style="margin: 10px 0 0 20px; max-height: 150px; overflow-y: auto;">
                  ${warnings.slice(0, 20).map(w => `<li>${w}</li>`).join('')}
                  ${warnings.length > 20 ? `<li>... and ${warnings.length - 20} more warnings</li>` : ''}
                </ul>
              </div>
            </div>
          `;
        }
        
        if (errors.length > 0) {
          resultHTML += `
            <div class="alert alert-danger" style="margin-top: 15px;">
              <i class="fas fa-exclamation-circle"></i>
              <div>
                <strong>Errors encountered:</strong>
                <ul style="margin: 10px 0 0 20px; max-height: 200px; overflow-y: auto;">
                  ${errors.slice(0, 20).map(error => `<li>${error}</li>`).join('')}
                  ${errors.length > 20 ? `<li>... and ${errors.length - 20} more errors</li>` : ''}
                </ul>
              </div>
            </div>
          `;
        }
        
        resultDiv.innerHTML = resultHTML;
        resultDiv.style.display = 'block';
        
        if (successCount > 0) {
          showAlert(`Successfully uploaded ${successCount} leave applications!`, 'success');
          setTimeout(() => {
            clearLeaveUpload();
          }, 5000);
        }
        
      } catch (error) {
        console.error('Leave upload error:', error);
        showAlert('Failed to process upload: ' + error.message, 'danger');
      }
    }

    // Filter students function
    function filterStudents(students, filters) {
      return students.filter(student => {
        if (filters.search) {
          const searchMatch = 
            (student.ID && student.ID.toString().toLowerCase().includes(filters.search)) ||
            (student.Name && student.Name.toLowerCase().includes(filters.search));
          if (!searchMatch) return false;
        }
        
        if (filters.category && student.Category !== filters.category) return false;
        if (filters.year && student.Year !== filters.year) return false;
        if (filters.semester && student.Semester !== filters.semester) return false;
        if (filters.specialization && student.Specialization !== filters.specialization) return false;
        
        return true;
      });
    }

    async function addStudent(event) {
      event.preventDefault();
      
      const studentId = document.getElementById('newStudentId').value.trim();
      const studentName = document.getElementById('newStudentName').value.trim();
      const category = document.getElementById('newStudentCategory').value;
      
      if (!studentId || !studentName || !category) {
        showAlert('Please fill in all required fields', 'warning');
        return;
      }
      
      if (window.existingStudentIds && window.existingStudentIds.has(studentId)) {
        showAlert('Student ID already exists! Please use a different ID.', 'danger');
        return;
      }
      
      const studentData = {
        ID: studentId,
        Name: studentName,
        Category: category,
        Year: document.getElementById('newStudentYear').value,
        Semester: document.getElementById('newStudentSemester').value,
        Specialization: document.getElementById('newStudentSpecialization').value,

      };
      
      const saveBtn = document.getElementById('saveStudentBtn');
      const originalText = saveBtn.innerHTML;
      saveBtn.innerHTML = '<div class="loading-spinner"></div> Saving...';
      saveBtn.disabled = true;
      
      try {
        const db = firebase.firestore();
        
        const existingSnapshot = await db.collection('students').where('ID', '==', studentId).get();
        if (!existingSnapshot.empty) {
          showAlert('Student ID already exists! Please use a different ID.', 'danger');
          saveBtn.innerHTML = originalText;
          saveBtn.disabled = false;
          return;

        await db.collection('students').add(studentData);

        showStudentsManagement();

        saveBtn.disabled = false;
      }

    let uploadedData = [];

    function handleBulkUpload(event) {
      const file = event.target.files[0];
      if (!file) return;
      
      if (file.size > 5 * 1024 * 1024) {
        showAlert('File size exceeds 5MB limit', 'danger');
        return;
      }
      
      const reader = new FileReader();
      reader.onload = function(e) {
        try {
          const text = e.target.result;
          const rows = [];
          const lines = text.split('\n');
          
          for (let i = 0; i < lines.length; i++) {
            if (lines[i].trim() === '') continue;
            
            const row = [];
            let current = '';
            let insideQuotes = false;
            
            for (let j = 0; j < lines[i].length; j++) {
              const char = lines[i][j];
              
              if (char === '"') {
                insideQuotes = !insideQuotes;
              } else if (char === ',' && !insideQuotes) {
                row.push(current.trim());
                current = '';
              } else {
                current += char;
              }
            }
            row.push(current.trim());
            rows.push(row);
          }
          
          if (rows.length < 2) {
            showAlert('CSV file must have at least a header row and one data row', 'warning');
            return;
          }
          
          const previewDiv = document.getElementById('studentUploadPreview');
          const previewTable = document.getElementById('studentPreviewTable');
          
          let previewHTML = '<table style="width: 100%; border-collapse: collapse; font-size: 14px;">';
          previewHTML += '<thead><tr style="background: #f8f9fa;">';
          rows[0].forEach((cell, index) => {
            previewHTML += `<th style="border: 1px solid #ddd; padding: 8px; text-align: left;">${cell}</th>`;
          });
          previewHTML += '</tr></thead><tbody>';
          
          const previewRows = Math.min(10, rows.length - 1);
          for (let i = 1; i <= previewRows; i++) {
            previewHTML += '<tr>';
            rows[i].forEach((cell, index) => {
              previewHTML += `<td style="border: 1px solid #ddd; padding: 8px;">${cell}</td>`;
            });
            previewHTML += '</tr>';
          }
          previewHTML += '</tbody></table>';
          
          if (rows.length > 11) {
            previewHTML += `<p style="text-align: center; color: #666; margin-top: 10px;">... and ${rows.length - 11} more rows</p>`;
          }
          
          previewTable.innerHTML = previewHTML;
          previewDiv.style.display = 'block';
          document.getElementById('studentUploadArea').style.display = 'none';
          
          uploadedData = rows.slice(1).filter(row => row.length >= 3 && row[0] && row[1] && row[2]);
          
          showAlert(`Loaded ${uploadedData.length} student records for upload`, 'info');
          
        } catch (error) {
          console.error('CSV parsing error:', error);
          showAlert('Error parsing CSV file: ' + error.message, 'danger');
        }
      };
      
      reader.readAsText(file);
    }

    async function processBulkUpload() {
      if (uploadedData.length === 0) {
        showAlert('No data to upload!', 'warning');
        return;
      }
      
      showAlert(`Processing ${uploadedData.length} student records...`, 'info');
      
      try {
        const db = firebase.firestore();
        let successCount = 0;
        let errorCount = 0;
        const errors = [];
        
        for (const row of uploadedData) {
          try {
            const studentData = {
              ID: row[0],
              Name: row[1],
              Category: row[2],
              Year: row[3] || '',
              Semester: row[4] || '',
              Specialization: row[5] || '',
              Email: row[6] || '',
              Phone: row[7] || '',
              createdAt: new Date().toISOString(),
              createdBy: currentUser?.email || 'admin',
              createdByRole: currentRole || 'admin'
            };
            
            const existingSnapshot = await db.collection('students').where('ID', '==', studentData.ID).get();
            if (!existingSnapshot.empty) {
              errors.push(`Student ID ${studentData.ID} already exists - skipped`);
              errorCount++;
              continue;
            }
            
            await db.collection('students').add(studentData);
            successCount++;
            
          } catch (err) {
            errors.push(`Error adding student ${row[0]}: ${err.message}`);
            errorCount++;
          }
        }
        
        const resultDiv = document.getElementById('uploadResult');
        let resultHTML = `
          <div class="alert ${successCount > 0 ? 'alert-success' : 'alert-warning'}">
            <i class="fas ${successCount > 0 ? 'fa-check-circle' : 'fa-exclamation-triangle'}"></i>
            <div>
              <strong>Upload Complete</strong>
              <p>Successfully uploaded: ${successCount} students</p>
              <p>Errors: ${errorCount}</p>
            </div>
          </div>
        `;
        
        if (errors.length > 0) {
          resultHTML += `
            <div class="alert alert-danger" style="margin-top: 15px;">
              <i class="fas fa-exclamation-circle"></i>
              <div>
                <strong>Errors encountered:</strong>
                <ul style="margin: 10px 0 0 20px; max-height: 200px; overflow-y: auto;">
                  ${errors.map(error => `<li>${error}</li>`).join('')}
                </ul>
              </div>
            </div>
          `;
        }
        
        resultDiv.innerHTML = resultHTML;
        resultDiv.style.display = 'block';
        
        if (successCount > 0) {
          setTimeout(() => {
            showStudentsManagement();
          }, 3000);
        }
        
      } catch (error) {
        console.error('Bulk upload error:', error);
        showAlert('Failed to process upload: ' + error.message, 'danger');
      }
    }

    async function generateReport() {
      const fromDate = document.getElementById('reportFromDate').value;
      const toDate = document.getElementById('reportToDate').value;
      const reportType = document.getElementById('reportType').value;
      
      currentFromDate = fromDate;
      currentToDate = toDate;
      
      saveFilterState('reports', {
        fromDate: fromDate,
        toDate: toDate,
        reportType: reportType
      });
      
      showAlert('Generating report...', 'info');
      
      try {
        const db = firebase.firestore();
        let data = [];
        let title = '';
        
        if (reportType === 'students') {
          let query = db.collection('students').orderBy('ID');
          
          // Apply staff approval scope if needed
          if (currentRole === 'staff') {
            const scopeFilter = getApprovalScopeFilter();
            if (scopeFilter) {
              query = query.where('Category', 'in', scopeFilter);
            }
          }
          
          const snapshot = await query.get();
          data = snapshot.docs.map(doc => doc.data());
          title = 'Student List Report';
        } else {
          let query = db.collection('leaveApplications');
          
          if (reportType !== 'all') {
            query = query.where('Status', '==', reportType);
          }
          
          // Apply staff approval scope if needed
          if (currentRole === 'staff') {
            const scopeFilter = getApprovalScopeFilter();
            if (scopeFilter) {
              // Get students in scope
              const studentsInScope = await db.collection('students')
                .where('Category', 'in', scopeFilter)
                .get();
              const studentIds = studentsInScope.docs.map(doc => doc.data().ID);
              
              if (studentIds.length > 0) {
                query = query.where('StudentID', 'in', studentIds);
              }
            }
          }
          
          const snapshot = await query.get();
          let applications = snapshot.docs.map(doc => doc.data());
          
          // Proper date filtering
          if (fromDate || toDate) {
            const fromDateObj = fromDate ? new Date(fromDate) : null;
            const toDateObj = toDate ? new Date(toDate) : null;
            
            if (fromDateObj) fromDateObj.setHours(0, 0, 0, 0);
            if (toDateObj) toDateObj.setHours(23, 59, 59, 999);
            
            applications = applications.filter(app => {
              const appFromDate = app.FromDate ? new Date(app.FromDate) : null;
              const appToDate = app.ToDate ? new Date(app.ToDate) : null;
              
              if (!appFromDate || !appToDate) return false;
              
              appFromDate.setHours(0, 0, 0, 0);
              appToDate.setHours(23, 59, 59, 999);
              
              if (fromDateObj && toDateObj) {
                return (appFromDate <= toDateObj && appToDate >= fromDateObj);
              } else if (fromDateObj) {
                return appToDate >= fromDateObj;
              } else if (toDateObj) {
                return appFromDate <= toDateObj;
              }
              
              return true;
            });
          }
          
          const studentsSnapshot = await db.collection('students').get();
          const studentsMap = {};
          studentsSnapshot.docs.forEach(doc => {
            const student = doc.data();
            studentsMap[student.ID] = student.Name;
          });
          
          applications.forEach(app => {
            app.StudentName = studentsMap[app.StudentID] || 'Unknown';
          });
          
          data = applications;
          title = `${reportType.charAt(0).toUpperCase() + reportType.slice(1)} Leave Applications Report`;
        }
        
        const reportResult = {
          title: title,
          fromDate: fromDate,
          toDate: toDate,
          generatedDate: new Date().toLocaleString(),
          total: data.length,
          data: data
        };
        
        currentReportData = reportResult;
        currentReportType = reportType;
        
        displayReport(reportResult, reportType);
        
      } catch (error) {
        console.error('Generate report error:', error);
        showAlert('Failed to generate report: ' + error.message, 'danger');
      }
    }

    async function createFirestoreBackup() {
      showAlert('Exporting data...', 'info');
      
      try {
        const db = firebase.firestore();
        
        const collections = ['students', 'leaveTypes', 'categories', 'yearCredits', 'leaveApplications', 'admins', 'staff'];
        const backupData = {};
        
        for (const collection of collections) {
          const snapshot = await db.collection(collection).get();
          backupData[collection] = snapshot.docs.map(doc => ({
            id: doc.id,
            data: doc.data()
          }));
        }
        
        backupData.timestamp = new Date().toISOString();
        backupData.version = '2.0';
        
        // Save backup record to Firestore
        await db.collection('configBackups').add({
          type: 'full_backup',
          timestamp: backupData.timestamp,
          collections: collections,
          recordCounts: Object.keys(backupData).reduce((acc, key) => {
            if (Array.isArray(backupData[key])) {
              acc[key] = backupData[key].length;
            }
            return acc;
          }, {})
        });
        
        const jsonString = JSON.stringify(backupData, null, 2);
        const blob = new Blob([jsonString], { type: 'application/json' });
        const link = document.createElement('a');
        const url = URL.createObjectURL(blob);
        link.setAttribute("href", url);
        link.setAttribute("download", `firestore_backup_${new Date().toISOString().split('T')[0]}.json`);
        link.style.visibility = 'hidden';
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);
        
        showAlert('Data exported successfully! Backup logged in Firestore.', 'success');
        loadBackupStats();
        
      } catch (error) {
        console.error('Export error:', error);
        showAlert('Failed to export data: ' + error.message, 'danger');
      }
    }

          <h2><i class="fas fa-upload"></i> Import Backup</h2>
          
          <div class="alert alert-danger">
            <i class="fas fa-exclamation-triangle"></i>
            <strong>Warning:</strong> This will overwrite ALL existing data. This action cannot be undone.
          </div>
          
          <div class="file-upload-area" onclick="document.getElementById('importFileInput').click()">
            <i class="fas fa-cloud-upload-alt" style="font-size: 3rem; color: #3498db; margin-bottom: 15px;"></i>

            </button>

    function handleImportFile(event) {
      const file = event.target.files[0];
      if (!file) return;
      
      const reader = new FileReader();
      reader.onload = function(e) {
        try {
          const backupData = JSON.parse(e.target.result);
          
          showConfirmationDialog(
            "Confirm Import",
            `This will import ${Object.keys(backupData).length} collections and overwrite all existing data. Are you sure?`,
            async () => {
              await processImport(backupData);
            }
          );
          
        } catch (error) {
          console.error('Parse backup error:', error);
          showAlert('Invalid backup file: ' + error.message, 'danger');
        }
      };
      
      reader.readAsText(file);
    }

    async function processImport(backupData) {
      showAlert('Importing data... This may take a moment.', 'info');
      
      try {
        const db = firebase.firestore();
        
        const collections = ['students', 'leaveTypes', 'categories', 'yearCredits', 'leaveApplications', 'admins', 'staff'];
        
        // Delete existing data
        for (const collection of collections) {
          if (backupData[collection]) {
            const snapshot = await db.collection(collection).get();
            const batch = db.batch();
            snapshot.docs.forEach(doc => {
              batch.delete(doc.ref);
            });
            await batch.commit();
          }
        }
        
        // Import new data
        for (const collection of collections) {
          if (backupData[collection] && backupData[collection].length > 0) {
            const batch = db.batch();
            backupData[collection].forEach(item => {
              const docRef = db.collection(collection).doc(item.id);
              batch.set(docRef, item.data);
            });
            await batch.commit();
          }
        }
        
        // Log import
        await db.collection('configBackups').add({
          type: 'import',
          timestamp: new Date().toISOString(),
          importedBy: currentUser?.email || 'admin'
        });
        
        showAlert('Data imported successfully!', 'success');
        closeModal();
        
        setTimeout(() => {
          location.reload();
        }, 2000);
        
      } catch (error) {
        console.error('Import error:', error);
        showAlert('Failed to import data: ' + error.message, 'danger');
      }
    }

    // Get recent students from localStorage (max 5)
    function getRecentStudents() {
      try {
        return JSON.parse(localStorage.getItem('recentViewedStudents') || '[]');
      } catch (e) {
        return [];
      }
    }

    // Save student ID to recent list (max 5)
    function saveRecentStudent(studentId) {
      try {
        let recent = getRecentStudents();
        // Remove if already exists
        recent = recent.filter(id => id !== studentId);
        // Add to beginning
        recent.unshift(studentId);
        // Keep only last 5
        recent = recent.slice(0, 5);
        localStorage.setItem('recentViewedStudents', JSON.stringify(recent));
      } catch (e) {
        console.log('Error saving recent student', e);
      }
    }

    // Main function to view student dashboard
    async function viewStudentDashboard() {
      const studentId = document.getElementById('viewStudentIdInput').value.trim();
      
      if (!studentId) {
        showAlert('Please enter a student ID', 'warning');
        return;
      }
      
      showAlert('Loading student dashboard...', 'info');
      
      try {
        if (firebase.apps.length === 0) {
          showAlert('Firebase not configured. Please contact administrator.', 'warning');
          return;
        }
        
        const db = firebase.firestore();
        
        // Check if current user (staff) has permission to view this student
        if (currentRole === 'staff') {
          const scopeFilter = getApprovalScopeFilter();
          if (scopeFilter) {
            const studentCheck = await db.collection('students').where('ID', '==', studentId).get();
            if (!studentCheck.empty) {
              const studentCategory = studentCheck.docs[0].data().Category;
              if (!scopeFilter.includes(studentCategory)) {
                showAlert('You do not have permission to view this student', 'danger');
                return;
              }
            }
          }
        }
        
        // Find the student
        const studentsSnapshot = await db.collection('students').where('ID', '==', studentId).get();
        
        if (studentsSnapshot.empty) {
          showAlert(`Student with ID "${studentId}" not found`, 'danger');
          return;
        }
        
        const studentDoc = studentsSnapshot.docs[0];
        const studentData = studentDoc.data();
        
        // Save to recent students
        saveRecentStudent(studentId);
        
        // Store the student being viewed temporarily
        window.viewingStudent = {
          uid: studentDoc.id,
          ...studentData,
          id: studentData.ID
        };
        
        // Show the student dashboard container
        document.getElementById('studentViewDashboard').style.display = 'block';
        
        // Load all three sections in one combined view
        await loadCombinedStudentView(window.viewingStudent);
        
      } catch (error) {
        console.error('Error viewing student dashboard:', error);
        showAlert('Failed to load student dashboard: ' + error.message, 'danger');
      }
    }
